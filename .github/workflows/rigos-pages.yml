name: RIGOS archive site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/rigos-pages.yml"
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/rigos-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate static archive
        shell: bash
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlparse

          root = Path("site")
          pages = sorted(root.glob("*.html"))
          assert pages, "no HTML pages found"

          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.links = []
                  self.scripts = []

              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if tag in {"a", "link", "img"}:
                      key = {"a": "href", "link": "href", "img": "src"}[tag]
                      if attrs.get(key):
                          self.links.append(attrs[key])
                  if tag == "script":
                      self.scripts.append(attrs.get("src", "inline"))

          failures = []
          for page in pages:
              parser = LinkParser()
              parser.feed(page.read_text(encoding="utf-8"))
              if parser.scripts:
                  failures.append(f"{page}: JavaScript is forbidden: {parser.scripts}")
              for target in parser.links:
                  parsed = urlparse(target)
                  if parsed.scheme or target.startswith("#") or target.startswith("mailto:"):
                      continue
                  local = (page.parent / parsed.path).resolve()
                  if not local.exists():
                      failures.append(f"{page}: missing local target {target}")

          if failures:
              raise SystemExit("\n".join(failures))
          print(f"validated {len(pages)} HTML pages; no scripts; local links resolved")
          PY

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static files
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
