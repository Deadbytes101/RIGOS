name: Alpha8 Physical Findings

on:
  push:
    branches:
      - fix/alpha8-physical-findings
    paths:
      - .alpha8-patch-trigger

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Apply exact source patch
        run: python3 scripts/apply-alpha8-physical-fixes.py

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.1
        with:
          components: rustfmt, clippy

      - name: Verify source
        run: ./scripts/verify.sh

      - name: Commit verified source
        run: |
          rm -f .alpha8-patch-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "alpha8 harden physical appliance findings"
          git push origin HEAD:fix/alpha8-physical-findings
