name: Apply Hive Exit Review Fixes

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hive-exit-review-fixes
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out fixed same-repository branch
        uses: actions/checkout@v4
        with:
          ref: stability/hive-exit-gates
          fetch-depth: 0

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.1
        with:
          components: rustfmt

      - name: Apply exact hostile-review patches
        run: python3 scripts/apply-hive-exit-review-fixes.py

      - name: Verify patched security boundary
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo fmt --all -- --check
          cargo test -p rigos-xmrig --lib
          python3 scripts/check-alpha8-runtime.py
          git diff --check

      - name: Remove temporary applicator machinery
        run: |
          git rm -- .github/workflows/hive-exit-review-fixes.yml
          git rm -- scripts/apply-hive-exit-review-fixes.py

      - name: Commit verified hostile-review fixes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rigos-xmrig/src/lib.rs \
                  build/usb/includes.chroot/usr/lib/rigos/rigos-runtime-render \
                  scripts/check-alpha8-runtime.py \
                  docs/hive-exit-hostile-review.md
          git diff --cached --check
          git commit -m "stability enforce public inspector boundary"
          git push origin HEAD:stability/hive-exit-gates
