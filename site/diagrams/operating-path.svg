<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1040" viewBox="0 0 1000 1040" role="img" aria-labelledby="title desc">
<title id="title">RIGOS operating path</title>
<desc id="desc">Boot authority, persistent state, runtime gates, miner ownership and operator observation.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#aaa89f"/>
  </marker>
  <style>
    .node { fill:#17181a; stroke:#777a80; stroke-width:1.5; }
    .decision { fill:#17181a; stroke:#77a7ff; stroke-width:1.5; }
    .edge { fill:none; stroke:#aaa89f; stroke-width:1.5; marker-end:url(#arrow); }
    .edge-dashed { fill:none; stroke:#aaa89f; stroke-width:1.5; stroke-dasharray:6 5; marker-end:url(#arrow); }
    .label { fill:#eceae0; font: 15px Consolas, Liberation Mono, Courier New, monospace; text-anchor:middle; dominant-baseline:middle; }
    .small { fill:#aaa89f; font: 12px Consolas, Liberation Mono, Courier New, monospace; text-anchor:middle; }
  </style>
</defs>

<rect class="node" x="350" y="30" width="300" height="54" rx="2"/>
<text class="label" x="500" y="57">BIOS or UEFI</text>
<rect class="node" x="350" y="130" width="300" height="54" rx="2"/>
<text class="label" x="500" y="157">Immutable Debian 12 root</text>
