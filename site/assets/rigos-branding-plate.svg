    .mark { fill:#eceae0; }
    .name { fill:#eceae0; font:700 31px Consolas, Liberation Mono, Courier New, monospace; letter-spacing:4px; }
    .line { fill:#aaa89f; font:13px Consolas, Liberation Mono, Courier New, monospace; letter-spacing:1px; }
    .stamp { fill:#eceae0; font:700 13px Consolas, Liberation Mono, Courier New, monospace; text-anchor:end; }
    .small { fill:#777a80; font:11px Consolas, Liberation Mono, Courier New, monospace; text-anchor:end; }
